; MapSizeExt configuration
; Place this file in your Yuri's Revenge game directory
; alongside MapSizeExt.dll.
;
; IMPORTANT: Do NOT change Stride above 512 until all hook
; sites are confirmed working. Start with 512 to verify the
; DLL loads cleanly (check MapSizeExt.log in the game dir).
; Then try 1024 on a small test map.

[MapSize]
; Grid stride width. Must be a power of 2.
; Default (vanilla): 512
; Test value: 1024
Stride=512

; Maximum map width in cells
MaxWidth=512

; Maximum map height in cells
MaxHeight=512
